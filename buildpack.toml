api = "0.7"

[buildpack]
  description = "A buildpack for precompiling rails assets"
  homepage = "https://github.com/paketo-buildpacks/rails-assets"
  id = "paketo-buildpacks/rails-assets"
  keywords = ["ruby", "rails", "assets"]
  name = "Paketo Buildpack for Rails Assets"

  [[buildpack.licenses]]
    type = "Apache-2.0"
    uri = "https://github.com/paketo-buildpacks/rails-assets/blob/main/LICENSE"

[metadata]
  include-files = ["buildpack.toml", "linux/amd64/bin/build", "linux/amd64/bin/detect", "linux/amd64/bin/run", "linux/arm64/bin/build", "linux/arm64/bin/detect", "linux/arm64/bin/run"]
  pre-package = "./scripts/build.sh --target linux/amd64 --target linux/arm64"

[[stacks]]
  id = "io.buildpacks.stacks.jammy"

[[stacks]]
  id = "io.buildpacks.stacks.noble"

[[targets]]
  os = "linux"
  arch = "amd64"

[[targets]]
  os = "linux"
  arch = "arm64"
